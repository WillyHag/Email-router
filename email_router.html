<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kreditorforeningen. – E-postsortering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1e1e2e;
    --ink-light: #2e2e42;
    --accent: #e6f535;
    --accent-muted: #d4e020;
    --white: #ffffff;
    --bg: #f4f4f0;
    --bg-dark: #eaeae4;
    --text: #1e1e2e;
    --text-muted: #6b6b7a;
    --border: #ddddd8;
    --high: #c0392b;
    --normal: #2c7a4e;
    --crimson: #991b1b;
    --parchment: #fffdf0;
    --parchment-dark: #eaeae4;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 8px;
    --transition: 0.2s ease;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--ink);
    color: var(--white);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    border-bottom: 3px solid var(--accent);
  }

  .header-logo {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: -0.02em;
  }

  .header-logo span {
    color: var(--accent);
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
  }

  .header-sub {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.5);
  }

  header .badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    color: var(--ink);
  }

  /* ─── LAYOUT ─── */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ─── STATS ─── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    border-top: 3px solid var(--border);
    transition: transform var(--transition), box-shadow var(--transition);
  }

  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  .stat-card.accent { border-top-color: var(--ink); }
  .stat-card.blue   { border-top-color: #3a7bd5; }
  .stat-card.green  { border-top-color: var(--normal); }
  .stat-card.red    { border-top-color: var(--high); }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 40px;
    line-height: 1;
    color: var(--text);
  }

  /* ─── PANELS ─── */
  .panel {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  .panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: lowercase;
    letter-spacing: -0.01em;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── TEXTAREA ─── */
  textarea {
    width: 100%;
    height: 160px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    resize: vertical;
    transition: border-color var(--transition), box-shadow var(--transition);
    outline: none;
  }

  textarea:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(30,30,46,0.08);
    background: var(--white);
  }

  textarea::placeholder { color: #aaa; }

  /* ─── BUTTONS ─── */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  .btn-full-width {
    width: 100%;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 18px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: all var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--white);
  }

  .btn-primary:hover {
    background: var(--ink-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(30,30,46,0.25);
  }

  .btn-secondary {
    background: var(--bg-dark);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--ink);
  }

  .btn-ghost:hover {
    background: var(--ink);
    color: var(--white);
  }

  /* ─── RESULT ─── */
  #result {
    margin-top: 20px;
    display: none;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 20px;
    background: var(--bg);
    border-radius: 8px;
    border-left: 4px solid var(--ink);
    margin-bottom: 16px;
  }

  .result-meta { flex: 1; }

  .result-category {
    font-size: 20px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    margin-bottom: 4px;
  }

  .result-priority {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .priority-high {
    background: #fde8e8;
    color: var(--high);
  }

  .priority-normal {
    background: #e8f5ee;
    color: var(--normal);
  }

  .score-row {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }

  .score-pill {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--white);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .triggers {
    margin-bottom: 16px;
  }

  .triggers-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .trigger-tag {
    display: inline-block;
    font-size: 12px;
    background: var(--bg-dark);
    color: var(--ink);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
    margin: 3px 3px 3px 0;
  }

  .no-triggers {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  .correct-row {
    display: flex;
    gap: 10px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .correct-label {
    font-size: 12px;
    color: var(--text-muted);
    align-self: center;
    margin-right: 4px;
  }

  /* ─── QUEUE ─── */
  .queue-empty {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .queue-item:last-child { border-bottom: none; }

  .queue-text {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .queue-badge {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .badge-saks { background: #e8f0fb; color: #2e6da4; }
  .badge-kund { background: var(--parchment-dark); color: var(--text-muted); }
  .badge-high { background: #fde8e8; color: var(--high); }
  .badge-normal { background: #e8f5ee; color: var(--normal); }

  .badge-corrected {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    background: #fff3e0;
    color: #e65100;
    border: 1px solid #ffcc80;
    white-space: nowrap;
  }

  /* ─── QUEUE META ─── */
  .queue-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 0;
    border-bottom: 1px solid var(--parchment-dark);
    animation: slideIn 0.2s ease;
  }

  .queue-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .queue-meta {
    font-size: 11px;
    color: var(--text-muted);
  }

  .queue-comment {
    font-size: 12px;
    color: var(--crimson);
    font-style: italic;
    padding-left: 2px;
  }

  /* ─── NAVN MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal {
    background: var(--white);
    border-radius: var(--radius);
    padding: 32px;
    width: 360px;
    box-shadow: var(--shadow-lg);
  }

  .modal h2 {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .modal input {
    width: 100%;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 7px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color var(--transition);
  }

  .modal input:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(30,30,46,0.08);
  }

  /* ─── KORRIGERING MODAL ─── */
  .correction-box {
    margin-top: 12px;
    padding: 14px;
    background: var(--parchment);
    border-radius: 8px;
    border: 1px solid var(--border);
    display: none;
  }

  .correction-box textarea {
    height: 80px;
    margin-top: 8px;
    font-size: 13px;
  }

  .correction-box .correction-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 700px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0 20px; }
    header .badge { display: none; }
    main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <h2>Velkommen!</h2>
    <p>Skriv inn navnet ditt for å fortsette. Dette brukes til å spore hvem som korrigerer klassifiseringer.</p>
    <input type="text" id="nameInput" aria-label="Skriv inn navnet ditt" placeholder="Fornavn Etternavn" maxlength="50">
    <button class="btn-primary btn-full-width" id="btnSaveName">Start</button>
  </div>
</div>

<header>
  <div class="header-logo">kreditorforeningen<span>.</span></div>
  <div class="header-right">
    <span class="header-sub">E-postsortering</span>
    <span class="badge">Testbase</span>
  </div>
</header>

<main>

  <div class="stats">
    <div class="stat-card accent">
      <div class="stat-label">Analyserte e-poster</div>
      <div class="stat-value" id="total">0</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Til kundesenter</div>
      <div class="stat-value" id="kund">0</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Til saksbehandler</div>
      <div class="stat-value" id="saks">0</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Høy prioritet</div>
      <div class="stat-value" id="risk">0</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Test en e-post</div>

    <textarea id="emailText" aria-label="E-post tekst" placeholder="Lim inn e-posttekst her…"></textarea>

    <div class="btn-row">
      <button class="btn-primary" id="btnAnalyze">
        ▶ Analyser e-post
      </button>
      <button class="btn-secondary" id="btnReset">
        ↺ Nullstill statistikk
      </button>
    </div>

    <div id="result" aria-live="polite"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Sakskø (simulert)</div>
    <div id="queueList"><div class="queue-empty">Ingen e-poster analysert ennå.</div></div>
  </div>

</main>

<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc,
         updateDoc, increment, collection,
         getDocs, addDoc, query, orderBy }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

/* ════════════════════════════════
   FIREBASE OPPSETT
════════════════════════════════ */

const firebaseConfig = {
  apiKey:            'AIzaSyAkVplEC-ha40TwGcPfFDJq0ginlYwsf9s',
  authDomain:        'kreditorforeningen-sortering.firebaseapp.com',
  projectId:         'kreditorforeningen-sortering',
  storageBucket:     'kreditorforeningen-sortering.firebasestorage.app',
  messagingSenderId: '41813857665',
  appId:             '1:41813857665:web:7a318d76621de088610480'
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const STATS_DOC    = doc(db, 'app', 'stats');
const TRAINING_COL = collection(db, 'training');

/* ════════════════════════════════
   NAVN
════════════════════════════════ */

let currentUser = '';

/* ════════════════════════════════
   UTILITIES
════════════════════════════════ */

function normalize(text) {
  return text
    .toLowerCase()
    .replace(/\n/g, ' ')
    .replace(/[.,!?]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function similarity(a, b) {
  const aw = a.split(' ');
  const bw = new Set(b.split(' '));
  return aw.filter(w => bw.has(w)).length;
}

function formatTimestamp(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('no-NO') + ' ' + d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
}

/* ════════════════════════════════
   STATISTIKK  (Firestore)
════════════════════════════════ */

async function loadStats() {
  try {
    const snap = await getDoc(STATS_DOC);
    const data = snap.exists() ? snap.data() : { total: 0, kund: 0, saks: 0, risk: 0 };
    ['total', 'kund', 'saks', 'risk'].forEach(k => {
      document.getElementById(k).textContent = data[k] ?? 0;
    });
  } catch (e) {
    console.error('loadStats feilet:', e);
  }
}

async function incrementStat(key) {
  try {
    await setDoc(STATS_DOC, { [key]: increment(1) }, { merge: true });
  } catch (e) {
    console.error('incrementStat feilet:', e);
  }
}

async function resetStats() {
  try {
    await setDoc(STATS_DOC, { total: 0, kund: 0, saks: 0, risk: 0 });
    await loadStats();
    document.getElementById('result').style.display = 'none';
  } catch (e) {
    console.error('resetStats feilet:', e);
  }
}

/* ════════════════════════════════
   TRENINGSDATA  (Firestore)
════════════════════════════════ */

async function getTraining() {
  try {
    const snap = await getDocs(query(TRAINING_COL, orderBy('timestamp', 'desc')));
    return snap.docs.map(d => d.data());
  } catch (e) {
    console.error('getTraining feilet:', e);
    return [];
  }
}

async function addTrainingItem(text, category) {
  await addDoc(TRAINING_COL, { text, category, timestamp: Date.now() });
}

/* ════════════════════════════════
   FRASER
════════════════════════════════ */

const SAKS_FRASER = [
  'jeg bestrider', 'jeg mener kravet', 'kravet er feil',
  'fakturaen er feil', 'mener kravet er feil', 'jeg skylder ikke',
  'kravet gjelder ikke meg', 'jeg har betalt', 'allerede betalt',
  'jeg har gjort opp', 'jeg mottok aldri', 'aldri mottok',
  'ikke mottatt', 'ikke levert', 'feil krav', 'feil faktura',
  'feil periode', 'gjelder ikke meg', 'settes på vent',
  'avklares med kreditor', 'jeg ber om dokumentasjon',
  'hvordan totalsummen er beregnet', 'innsigelse til renter',
  'innsigelse til gebyrer',
  'feil person', 'registrert på feil', 'ikke min gjeld',
  'aldri hatt et kundeforhold', 'har ikke hatt kundeforhold',
  'kjenner ikke til', 'ikke mitt krav', 'tilhører ikke meg',
  'må være en feil', 'dette er en feil', 'feil registrering',
  'betalingen ble gjennomført', 'betalt via nettbank',
  'allerede gjort opp', 'oppgjort', 'kvittering',
  'reagerer sterkt', 'uakseptabelt', 'klage saken inn',
  'finansklagenemnda', 'forbrukertilsynet', 'forbrukerrådet',
  'vil klage', 'sender klage', 'innen 48 timer', 'innen 24 timer',
  'rettslige skritt', 'ta rettslige', 'bringe saken inn',
  'klage til', 'anmelde forholdet', 'politianmeldelse',
  'stevne', 'forliksrådet', 'tingretten', 'inkassoloven',
  'bryter med', 'ulovlig', 'urettmessig'
];

const KUND_FRASER = [
  'kan dere sende kopi', 'ønsker kopi', 'kopi av faktura',
  'hva er saldo', 'betalingsinformasjon', 'hva er kontonummer',
  'kan jeg få kid'
];

const RISIKO_ORD = [
  'namsmann', 'tvangssalg', 'advokat', 'finansklagenemnda',
  'forbrukertilsynet', 'forbrukerrådet', 'inkassoklagenemnda',
  'tingretten', 'forliksrådet', 'rettslig', 'rettssak',
  'stevning', 'rettslige skritt', 'politianmeldelse',
  'gjeldsordning', 'konkurs', 'inkassoloven'
];

/* ════════════════════════════════
   ANALYSE
════════════════════════════════ */

let lastEmail = '';

async function analyze() {
  const raw = document.getElementById('emailText').value.trim();
  if (!raw) { alert('Skriv eller lim inn en e-posttekst.'); return; }

  const text = normalize(raw);
  lastEmail  = text;

  let scoreSaks = 0, scoreKund = 0, risikoScore = 0;
  const triggers = [];

  SAKS_FRASER.forEach(f => {
    if (text.includes(f)) { scoreSaks += 15; triggers.push(f); }
  });

  KUND_FRASER.forEach(f => {
    if (text.includes(f)) { scoreKund += 10; triggers.push(f); }
  });

  const training   = await getTraining();
  const threshold  = Math.max(5, text.split(' ').length * 0.25);
  training.forEach(item => {
    const sim = similarity(text, item.text);
    if (sim >= threshold) {
      if (item.category === 'Saksbehandler') scoreSaks += 20;
      if (item.category === 'Kundesenter')   scoreKund += 20;
      triggers.push('Læringsmatch');
    }
  });

  RISIKO_ORD.forEach(o => {
    if (text.includes(o)) risikoScore += 40;
  });

  const kategori  = scoreSaks > scoreKund ? 'Saksbehandler' : 'Kundesenter';
  const prioritet = risikoScore >= 40 ? 'Høy' : 'Normal';

  await incrementStat('total');
  await incrementStat(kategori === 'Saksbehandler' ? 'saks' : 'kund');
  if (prioritet === 'Høy') await incrementStat('risk');
  await loadStats();

  addToQueue(raw, kategori, prioritet);
  renderResult(kategori, prioritet, scoreSaks, scoreKund, triggers);
}

/* ════════════════════════════════
   RENDER RESULTAT
════════════════════════════════ */

function renderResult(kategori, prioritet, scoreSaks, scoreKund, triggers) {
  const prioClass  = prioritet === 'Høy' ? 'priority-high' : 'priority-normal';
  const prioSymbol = prioritet === 'Høy' ? '⚠' : '✓';

  const triggerHtml = triggers.length
    ? triggers.map(t => `<span class="trigger-tag">${t}</span>`).join('')
    : '<span class="no-triggers">Ingen spesifikke fraser funnet</span>';

  const el = document.getElementById('result');
  el.style.display = 'block';
  el.innerHTML = `
    <div class="result-header">
      <div class="result-meta">
        <div class="result-category">${kategori}</div>
        <span class="result-priority ${prioClass}">${prioSymbol} ${prioritet} prioritet</span>
        <div class="score-row">
          <span class="score-pill">Saksbehandler: ${scoreSaks}</span>
          <span class="score-pill">Kundesenter: ${scoreKund}</span>
        </div>
      </div>
    </div>

    <div class="triggers">
      <div class="triggers-title">Utløsende signaler</div>
      ${triggerHtml}
    </div>

    <div class="correct-row">
      <span class="correct-label">Rett klassifisering:</span>
      <button class="btn-ghost" onclick="window.showCorrection('Kundesenter')">Kundesenter</button>
      <button class="btn-ghost" onclick="window.showCorrection('Saksbehandler')">Saksbehandler</button>
    </div>

    <div class="correction-box" id="correctionBox">
      <label for="correctionComment" class="correction-label">Kommentar (valgfritt)</label>
      <textarea id="correctionComment" placeholder="Beskriv kort hvorfor klassifiseringen er feil…"></textarea>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn-primary" id="btnConfirmCorrection">Bekreft korrigering</button>
        <button class="btn-secondary" onclick="window.hideCorrection()">Avbryt</button>
      </div>
    </div>
  `;
}

   SAKSKØ
════════════════════════════════ */

let queueIdCounter = 0;

function addToQueue(raw, kategori, prioritet) {
  const list  = document.getElementById('queueList');
  const empty = list.querySelector('.queue-empty');
  if (empty) empty.remove();

  const badgeKat  = kategori === 'Saksbehandler' ? 'badge-saks' : 'badge-kund';
  const badgePrio = prioritet === 'Høy' ? 'badge-high' : 'badge-normal';
  const id        = 'queue-item-' + (++queueIdCounter);
  const ts        = formatTimestamp(Date.now());

  const item = document.createElement('div');
  item.className = 'queue-item';
  item.id = id;
  item.innerHTML = `
    <div class="queue-top">
      <span class="queue-text">${raw.substring(0, 80)}…</span>
      <span class="queue-badge ${badgeKat}">${kategori}</span>
      <span class="queue-badge ${badgePrio}">${prioritet}</span>
    </div>
    <div class="queue-meta">🕐 ${ts} · ${currentUser}</div>
  `;
  list.prepend(item);
  return id;
}

/* ════════════════════════════════
   KORRIGERING
════════════════════════════════ */

let pendingCategory = '';

function showCorrection(category) {
  pendingCategory = category;
  const box = document.getElementById('correctionBox');
  box.style.display = 'block';
  document.getElementById('correctionComment').value = '';
  document.getElementById('correctionComment').focus();

  document.getElementById('btnConfirmCorrection').onclick = () => {
    const comment = document.getElementById('correctionComment').value.trim();
    learn(pendingCategory, comment);
  };
}

function hideCorrection() {
  document.getElementById('correctionBox').style.display = 'none';
  pendingCategory = '';
}
