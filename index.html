<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kreditorforeningen. – E-postsortering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1e1e2e;
    --ink-light: #2e2e42;
    --accent: #e6f535;
    --accent-muted: #d4e020;
    --white: #ffffff;
    --bg: #f4f4f0;
    --bg-dark: #eaeae4;
    --text: #1e1e2e;
    --text-muted: #6b6b7a;
    --border: #ddddd8;
    --high: #c0392b;
    --normal: #2c7a4e;
    --crimson: #991b1b;
    --parchment: #fffdf0;
    --parchment-dark: #eaeae4;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 8px;
    --transition: 0.2s ease;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--ink); color: var(--white); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 68px; border-bottom: 3px solid var(--accent); }
  .header-logo { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--white); letter-spacing: -0.02em; }
  .header-logo span { color: var(--accent); }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .header-sub { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.5); }
  header .badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; background: var(--accent); padding: 3px 10px; border-radius: 20px; color: var(--ink); }
  main { max-width: 1080px; margin: 0 auto; padding: 32px 24px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 20px 24px; box-shadow: var(--shadow); border-top: 3px solid var(--border); transition: transform var(--transition), box-shadow var(--transition); }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .stat-card.accent { border-top-color: var(--ink); }
  .stat-card.blue { border-top-color: #3a7bd5; }
  .stat-card.green { border-top-color: var(--normal); }
  .stat-card.red { border-top-color: var(--high); }
  .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 40px; line-height: 1; color: var(--text); }
  .panel { background: var(--white); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); margin-bottom: 24px; }
  .panel-title { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; text-transform: lowercase; letter-spacing: -0.01em; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  textarea { width: 100%; height: 160px; padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; resize: vertical; transition: border-color var(--transition); outline: none; }
  textarea:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(30,30,46,0.08); background: var(--white); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  button { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 18px; border: none; border-radius: 7px; cursor: pointer; transition: all var(--transition); display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--ink); color: var(--white); }
  .btn-secondary { background: var(--bg-dark); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
  .btn-ghost:hover { background: var(--ink); color: var(--white); }
  #result { margin-top: 20px; display: none; }
  .result-header { display: flex; align-items: flex-start; gap: 20px; padding: 20px; background: var(--bg); border-radius: 8px; border-left: 4px solid var(--ink); margin-bottom: 16px; }
  .result-category { font-size: 20px; font-family: 'DM Mono', monospace; color: var(--text); }
  .result-priority { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
  .priority-high { background: #fde8e8; color: var(--high); }
  .priority-normal { background: #e8f5ee; color: var(--normal); }
  .score-pill { font-size: 12px; color: var(--text-muted); background: var(--white); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; margin-right: 5px; }
  .trigger-tag { display: inline-block; font-size: 12px; background: var(--bg-dark); color: var(--ink); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; margin: 3px 3px 3px 0; }
  .queue-item { display: flex; flex-direction: column; gap: 6px; padding: 14px 0; border-bottom: 1px solid var(--parchment-dark); }
  .queue-top { display: flex; align-items: center; gap: 12px; }
  .queue-text { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .badge-saks { background: #e8f0fb; color: #2e6da4; }
  .badge-kund { background: var(--parchment-dark); color: var(--text-muted); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--white); border-radius: var(--radius); padding: 32px; width: 360px; box-shadow: var(--shadow-lg); text-align: center; }
  .modal input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid var(--border); border-radius: 6px; }
  .correction-box { margin-top: 12px; padding: 14px; background: var(--parchment); border-radius: 8px; border: 1px solid var(--border); display: none; }
</style>
</head>
<body>

<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <h2 style="font-family:'DM Mono'">Velkommen!</h2>
    <p style="font-size:13px; color:var(--text-muted); margin-top:10px">Skriv inn navnet ditt for å starte.</p>
    <input type="text" id="nameInput" placeholder="Fornavn Etternavn">
    
    <button class="btn-primary" id="btnSaveName" style="width:100%; justify-content:center">Start</button>
    
  </div>
</div>

<header>
  <div class="header-logo">kreditorforeningen<span>.</span></div>
  <div class="header-right"><span class="header-sub">E-postsortering</span></div>
</header>

<main>
  <div class="stats">
    <div class="stat-card accent"><div class="stat-label">Totalt</div><div class="stat-value" id="total">0</div></div>
    <div class="stat-card blue"><div class="stat-label">Kundesenter</div><div class="stat-value" id="kund">0</div></div>
    <div class="stat-card green"><div class="stat-label">Saksbehandler</div><div class="stat-value" id="saks">0</div></div>
    <div class="stat-card red"><div class="stat-label">Høy pri</div><div class="stat-value" id="risk">0</div></div>
  </div>

  <div class="panel">
    <div class="panel-title">Analyse</div>
    <textarea id="emailText" placeholder="Lim inn e-post her..."></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="btnAnalyze">Analyser e-post</button>
      <button class="btn-secondary" id="btnReset">Nullstill tall</button>
    </div>
    <div id="result"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Siste analyser</div>
    <div id="queueList"></div>
  </div>
</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, collection, getDocs, addDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyAkVplEC-ha40TwGcPfFDJq0ginlYwsf9s',
  authDomain: 'kreditorforeningen-sortering.firebaseapp.com',
  projectId: 'kreditorforeningen-sortering',
  storageBucket: 'kreditorforeningen-sortering.firebasestorage.app',
  messagingSenderId: '41813857665',
  appId: '1:41813857665:web:7a318d76621de088610480'
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const STATS_DOC = doc(db, 'app', 'stats');
const TRAINING_COL = collection(db, 'training');

let currentUser = '';
let lastEmail = '';

// --- HJELPEFUNKSJONER ---
const normalize = (t) => t.toLowerCase().replace(/[.,!?]/g, ' ').replace(/\s+/g, ' ').trim();
const similarity = (a, b) => {
  const aw = a.split(' ');
  const bw = new Set(b.split(' '));
  return aw.filter(w => bw.has(w)).length;
};

// --- FIREBASE OPERASJONER ---
async function loadStats() {
  const snap = await getDoc(STATS_DOC);
  const data = snap.exists() ? snap.data() : { total: 0, kund: 0, saks: 0, risk: 0 };
  ['total', 'kund', 'saks', 'risk'].forEach(k => {
    document.getElementById(k).textContent = data[k] || 0;
  });
}

async function updateStats(kat, pri) {
  const update = { total: increment(1) };
  if (kat === 'Saksbehandler') update.saks = increment(1); else update.kund = increment(1);
  if (pri === 'Høy') update.risk = increment(1);
  await setDoc(STATS_DOC, update, { merge: true });
  loadStats();
}

// --- LOGIKK ---
async function analyze() {
  const raw = document.getElementById('emailText').value.trim();
  if (!raw) return;
  lastEmail = normalize(raw);

  const saksFraser = ['bestrider', 'feil krav', 'ikke mottatt', 'klage', 'namsmann', 'forliksrådet'];
  const riskFraser = ['namsmann', 'advokat', 'finansklagenemnda', 'rettslige skritt'];
  
  let sScore = 0;
  let triggers = [];
  saksFraser.forEach(f => { if(lastEmail.includes(f)) { sScore += 20; triggers.push(f); }});
  
  let pri = 'Normal';
  riskFraser.forEach(f => { if(lastEmail.includes(f)) pri = 'Høy'; });

  const kat = sScore > 0 ? 'Saksbehandler' : 'Kundesenter';
  
  await updateStats(kat, pri);
  renderResult(kat, pri, triggers);
  addToQueue(raw, kat, pri);
}

function renderResult(kat, pri, triggers) {
  const res = document.getElementById('result');
  res.style.display = 'block';
  res.innerHTML = `
    <div class="result-header">
      <div>
        <div class="result-category">${kat}</div>
        <span class="result-priority ${pri === 'Høy' ? 'priority-high' : 'priority-normal'}">${pri} prioritet</span>
      </div>
    </div>
    <div style="margin-bottom:15px">${triggers.map(t => `<span class="trigger-tag">${t}</span>`).join('')}</div>
    <div class="btn-row">
      <span style="font-size:12px; align-self:center">Korriger til:</span>
      <button class="btn-ghost" onclick="window.learn('Kundesenter')">Kundesenter</button>
      <button class="btn-ghost" onclick="window.learn('Saksbehandler')">Saksbehandler</button>
    </div>
  `;
}

function addToQueue(raw, kat, pri) {
  const q = document.getElementById('queueList');
  const div = document.createElement('div');
  div.className = 'queue-item';
  div.innerHTML = `
    <div class="queue-top">
      <span class="queue-text">${raw.substring(0,60)}...</span>
      <span class="queue-badge ${kat === 'Saksbehandler' ? 'badge-saks' : 'badge-kund'}">${kat}</span>
    </div>
  `;
  q.prepend(div);
}

window.learn = async function(newKat) {
  await addDoc(TRAINING_COL, { text: lastEmail, category: newKat, user: currentUser, ts: Date.now() });
  alert("Systemet har lært at dette er " + newKat);
};

// --- STARTUP ---
// Vi flytter funksjonene ut til "window" slik at de er globalt tilgjengelige
window.saveName = function() {
  const n = document.getElementById('nameInput').value.trim();
  if(!n) {
    alert("Vennligst skriv inn navn");
    return;
  }
  currentUser = n;
  document.getElementById('nameModal').style.display = 'none';
  console.log("Navn satt til:", currentUser);
  loadStats();
};

window.runAnalyze = function() {
  analyze();
};

window.runReset = async function() {
  if(confirm("Er du sikker på at du vil nullstille all statistikk?")) {
    await setDoc(STATS_DOC, { total:0, saks:0, kund:0, risk:0 });
    loadStats();
  }
};

// Koble til knappene når siden er lastet
document.addEventListener('DOMContentLoaded', () => {
  const btnSave = document.getElementById('btnSaveName');
  const btnAna = document.getElementById('btnAnalyze');
  const btnRes = document.getElementById('btnReset');

  if(btnSave) btnSave.onclick = window.saveName;
  if(btnAna)  btnAna.onclick  = window.runAnalyze;
  if(btnRes)  btnRes.onclick  = window.runReset;
  
  // Gjør at man kan trykke Enter i navnefeltet
  const nameInput = document.getElementById('nameInput');
  if(nameInput) {
    nameInput.onkeydown = (e) => {
      if (e.key === 'Enter') window.saveName();
    };
  }
});
</script>
</body>
</html>
